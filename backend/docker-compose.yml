services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: esea-mssql
    profiles:
      - dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "esea@Dev123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esea-backend
    profiles:
      - dev
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Default=Server=mssql,1433;Database=ESeaDb;User Id=sa;Password=esea@Dev123;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mssql

volumes:
  mssql_data:
