services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: esea-mssql
    profiles:
      - dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "esea@Dev123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
